<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MyTube</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background-color: #202020;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: red;
}

.search input {
    width: 400px;
    padding: 8px;
    border-radius: 20px;
    border: none;
}

/* LAYOUT */
.container {
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 200px;
    background: #181818;
    height: 100vh;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    padding: 12px 20px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #383838;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
}

/* VIDEO CARD */
.card {
    cursor: pointer;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.info {
    display: flex;
    margin-top: 10px;
}

.info img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
}

.text .title {
    font-size: 14px;
    font-weight: bold;
}

.text .channel {
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<header>
    <div class="logo">MyTube</div>
    <div class="search">
        <input type="text" placeholder="Rechercher">
    </div>
</header>

<div class="container">

<div class="sidebar">
    <a href="#">🏠 Accueil</a>

    <a href="#">📚 Bibliothèque</a>
</div>

<div class="content">
<div class="grid">
